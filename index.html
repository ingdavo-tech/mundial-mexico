function rowSlot(n,slot){const i=SLOTS.indexOf(slot);return '3'+ANNEXC[n][i];}

function ft(g,n){return G[g].find(t=>t[0]===n);}
function applyAll(){
 G=JSON.parse(JSON.stringify(BASE));
 FIXTURES.forEach(f=>{const h=document.querySelector(`[data-fx="${f.id}"][data-s="h"]`).value,a=document.querySelector(`[data-fx="${f.id}"][data-s="a"]`).value;
  if(h===''||a==='')return;const hg=+h,ag=+a;if(isNaN(hg)||isNaN(ag))return;
  const H=ft(f.g,f.h),A=ft(f.g,f.a);H[2]++;A[2]++;H[6]+=hg;H[7]+=ag;A[6]+=ag;A[7]+=hg;
  if(hg>ag){H[3]++;A[5]++}else if(hg<ag){A[3]++;H[5]++}else{H[4]++;A[4]++}});
 recompute();
}
function st(t){return{name:t[0],pts:t[3]*3+t[4],gd:t[6]-t[7],GF:t[6],cards:t[8]||0,fifa:FIFA[t[0]]||99,P:t[2]};}
function gk(a,b){return b.pts-a.pts||b.gd-a.gd||b.GF-a.GF||(a.cards-b.cards)||(a.fifa-b.fifa);}
// detect if a tiebreak beyond GF was actually needed between two adjacent thirds
function tiedBeyondGF(a,b){return a.pts===b.pts&&a.gd===b.gd&&a.GF===b.GF;}

function recompute(){
 const thirds=[],win={};
 GL.forEach(g=>{const s=G[g].map(st).sort(gk);win[g]=s[0];thirds.push({...s[2],g});});
 thirds.sort(gk);
 // flag any third whose ordering vs its neighbor needed cards/fifa
 thirds.forEach((t,i)=>{t.flag=false;
   if(i>0&&tiedBeyondGF(thirds[i-1],t))t.flag=true;
   if(i<thirds.length-1&&tiedBeyondGF(t,thirds[i+1]))t.flag=true;});

 if(row){const slot=rowSlot(rnum,'1A'),og=slot[1],ot=top8.find(t=>t.g===og);

  mt.textContent=(ot?`3° Grupo ${og} · ${ot.pts} pts`:'')+(done?' · DEFINITIVO ✓':' · provisional');
  renderMU(rnum,win,top8);
 }else{bn.textContent='incompleto';mt.textContent='';document.getElementById('matchups').innerHTML='';}
}

  rows+=`<tr class="${inT?'in':'out'} ${mx?'mexopp':''}"><td>${i+1}</td>

   <td>${t.pts}</td><td>${t.gd>=0?'+':''}${t.gd}</td><td>${t.GF}</td></tr>`;});
 document.getElementById('thirdTable').innerHTML=`<table class="third"><thead><tr><th>#</th><th>Equipo</th><th>Pts</th><th>DG</th><th>GF</th></tr></thead><tbody>${rows}</tbody></table>`;

   : 'Orden: Pts → Dif. gol → Goles a favor. Si dos quedan iguales en los tres, decide tarjetas y ranking FIFA (se marca con ⚑).';
}
function renderMU(rnum,w,top8){
 function ru(g){const s=G[g].map(st).sort(gk);return s[1].name;}

 const PEND=new Set(['J','K','L']);
